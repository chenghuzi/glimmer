---
name: GemmaScreen
options:
  bundleIdPrefix: cn.youyou
  deploymentTarget:
    iOS: "17.0"
packages:
  GlimmerIOS:
    path: .
targets:
  GemmaScreen:
    type: application
    platform: iOS
    sources:
      - App
      - Resources
      - path: Model/asd-gemma4-code9.litertlm
        buildPhase: resources
    dependencies:
      - package: GlimmerIOS
        product: GlimmerIOS
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: 行为筛查
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: 选择行为视频，在本地进行筛查分析（数据不离开设备）
        NSCameraUsageDescription: 录制行为视频用于本地筛查分析（数据不离开设备）
        NSMicrophoneUsageDescription: 录制视频时一并采集声音（数据不离开设备）
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.youyou.gemmascreen
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        DEVELOPMENT_TEAM: XN9XFCT4XH
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/GemmaScreen.entitlements
        OTHER_LDFLAGS: -all_load
schemes:
  GemmaScreen:
    build:
      targets:
        GemmaScreen: all
    run:
      config: Debug
    archive:
      config: Release
