---
name: GemmaScreen
options:
  bundleIdPrefix: cn.youyou
  deploymentTarget:
    iOS: "17.0"
packages:
  GlimmerIOS:
    path: .
targets:
  GemmaScreen:
    type: application
    platform: iOS
    sources:
      - App
      - Resources
    dependencies:
      - package: GlimmerIOS
        product: GlimmerIOS
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: 微光 Glimmer
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: 选择行为视频，在本地进行筛查分析（数据不离开设备）
        NSCameraUsageDescription: 录制行为视频用于本地筛查分析（数据不离开设备）
        NSMicrophoneUsageDescription: 录制视频时一并采集声音（数据不离开设备）
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${GEMMASCREEN_PRODUCT_BUNDLE_IDENTIFIER}
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        DEVELOPMENT_TEAM: ${GEMMASCREEN_DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/GemmaScreen.entitlements
        OTHER_LDFLAGS: -all_load

  # 仅模拟器：visual loop 可视化壳。
  GlimmerGallery:
    type: application
    platform: iOS
    sources:
      - Gallery
      - Resources
    dependencies:
      - package: GlimmerIOS
        product: GlimmerIOS
    info:
      path: Gallery/Info.plist
      properties:
        CFBundleDisplayName: 微光 Glimmer
        UILaunchScreen: {}
        NSCameraUsageDescription: 录制行为视频（可视化壳）
        NSMicrophoneUsageDescription: 录制声音（可视化壳）
        NSPhotoLibraryUsageDescription: 选择视频（可视化壳）
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${GLIMMER_GALLERY_PRODUCT_BUNDLE_IDENTIFIER}
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${GLIMMER_GALLERY_DEVELOPMENT_TEAM}
        # Large on-device inference needs the higher memory entitlement.
        CODE_SIGN_ENTITLEMENTS: Gallery/GlimmerGallery.entitlements
        OTHER_LDFLAGS: -all_load
schemes:
  GemmaScreen:
    build:
      targets:
        GemmaScreen: all
    run:
      config: Debug
    archive:
      config: Release
  GlimmerGallery:
    build:
      targets:
        GlimmerGallery: all
    run:
      config: Debug
