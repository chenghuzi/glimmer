---
name: GemmaScreen
options:
  bundleIdPrefix: cn.youyou
  deploymentTarget:
    iOS: "17.0"
packages:
  GlimmerIOS:
    path: .
targets:
  GemmaScreen:
    type: application
    platform: iOS
    sources:
      - App
      - Resources
      - path: Model/model-Q4_K_M.gguf
        buildPhase: resources
      - path: Model/mmproj-bf16.gguf
        buildPhase: resources
    dependencies:
      - package: GlimmerIOS
        product: GlimmerIOS
    preBuildScripts:
      - name: Verify GGUF model sources
        script: |
          set -euo pipefail
          for name in model-Q4_K_M.gguf mmproj-bf16.gguf; do
            path="${SRCROOT}/Model/${name}"
            if [ ! -s "${path}" ]; then
              echo "Missing or empty GGUF model source: ${path}" >&2
              echo "Run: ${SRCROOT}/Scripts/prepare-local-gguf-models.sh" >&2
              exit 1
            fi
          done
    postBuildScripts:
      - name: Verify bundled GGUF model files
        script: |
          set -euo pipefail
          bundle_dir="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          for name in model-Q4_K_M.gguf mmproj-bf16.gguf; do
            path="${bundle_dir}/${name}"
            if [ ! -s "${path}" ]; then
              echo "Missing or empty bundled GGUF model: ${path}" >&2
              echo "Run: ${SRCROOT}/Scripts/prepare-local-gguf-models.sh" >&2
              exit 1
            fi
            if [ -L "${path}" ]; then
              echo "Bundled GGUF model must be a real file, not a symlink: ${path}" >&2
              echo "Run: ${SRCROOT}/Scripts/prepare-local-gguf-models.sh" >&2
              exit 1
            fi
          done
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: 行为筛查
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: 选择行为视频，在本地进行筛查分析（数据不离开设备）
        NSCameraUsageDescription: 录制行为视频用于本地筛查分析（数据不离开设备）
        NSMicrophoneUsageDescription: 录制视频时一并采集声音（数据不离开设备）
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.youyou.gemmascreen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        DEVELOPMENT_TEAM: XN9XFCT4XH
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/GemmaScreen.entitlements
        OTHER_LDFLAGS: -all_load

  # 仅模拟器：visual loop 可视化壳。不打包 GGUF 模型、无模型校验脚本，秒级构建。
  GlimmerGallery:
    type: application
    platform: iOS
    sources:
      - Gallery
      - Resources
      # 真机测试需随包模型（与主 App 同两份 GGUF），bundled 后不触发联网下载
      - path: Model/model-Q4_K_M.gguf
        buildPhase: resources
      - path: Model/mmproj-bf16.gguf
        buildPhase: resources
    dependencies:
      - package: GlimmerIOS
        product: GlimmerIOS
    info:
      path: Gallery/Info.plist
      properties:
        CFBundleDisplayName: Glimmer Gallery
        UILaunchScreen: {}
        NSCameraUsageDescription: 录制行为视频（可视化壳）
        NSMicrophoneUsageDescription: 录制声音（可视化壳）
        NSPhotoLibraryUsageDescription: 选择视频（可视化壳）
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.youyou.glimmergallery
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XN9XFCT4XH
        # 大模型推理需要更高内存上限，否则在预留计算缓冲时 posix_memalign 失败 → OOM 崩溃
        CODE_SIGN_ENTITLEMENTS: Gallery/GlimmerGallery.entitlements
        OTHER_LDFLAGS: -all_load
schemes:
  GemmaScreen:
    build:
      targets:
        GemmaScreen: all
    run:
      config: Debug
    archive:
      config: Release
  GlimmerGallery:
    build:
      targets:
        GlimmerGallery: all
    run:
      config: Debug
